# ==============================================
# MOSQUITTO MQTT BROKER - Configuration
# Hackathon IoT 2026 - Supervision Industrielle
# ==============================================

# --- Persistance ---
persistence true
persistence_location /mosquitto/data/

# --- Logs ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# --- Authentification globale ---
password_file /mosquitto/config/passwd
allow_anonymous false

# --- ACL globale ---
acl_file /mosquitto/config/acl.conf

# ==============================================
# LISTENER 1 : MQTT Standard (port 1883)
# Communication interne Docker
# ==============================================
listener 1883
protocol mqtt

# ==============================================
# LISTENER 2 : MQTT over TLS (port 8883)
# Connexions sécurisées externes
# ==============================================
listener 8883
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
tls_version tlsv1.2

# ==============================================
# LISTENER 3 : WebSocket (port 9001)
# Debug et clients web
# ==============================================
listener 9001
protocol websockets

# --- Paramètres avancés ---
max_inflight_messages 200
max_queued_messages 1000
message_size_limit 1048576
